<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bee's Beans & Greens</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="hero">
    <div class="logo-mark">🐝</div>

    <h1>Bee's Beans & Greens</h1>

    <p class="tagline">
      Where caffeine meets poor decisions.
    </p>

    <a href="#menu" class="enter-button">
      Enter the Menu
    </a>
  </header>

  <main id="menu">

    <section class="menu-section">
      <h2>Beans</h2>

      <div id="beans-menu" class="menu-grid"></div>
    </section>

    <section class="menu-section">
      <h2>Greens</h2>

      <div id="greens-menu" class="menu-grid"></div>
    </section>

  </main>

  <button id="cart-button" class="cart-button">
    Order
    <span id="cart-count">0</span>
  </button>

  <div id="cart-panel" class="cart-panel">
    <div class="cart-header">
      <h2>Your Poor Decisions</h2>
      <button id="close-cart" aria-label="Close order">×</button>
    </div>

    <div id="cart-items"></div>

    <div class="cart-footer">
      <p>
        Total:
        <strong id="cart-total">$0.00</strong>
      </p>

      <button id="checkout-button">
        Continue to Checkout
      </button>
    </div>
  </div>

  <div id="cart-overlay" class="cart-overlay"></div>

  <footer>
    Small-batch drinks prepared individually for invited guests.
  </footer>

  <script src="script.js"></script>
</body>
</html>
